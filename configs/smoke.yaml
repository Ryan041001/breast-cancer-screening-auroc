experiment:
  name: smoke

paths:
  project_root: ..
  train_csv: train.csv
  train_images: train_img
  test_images: test_img
  submission_template: name_sid_submission.csv
  output_root: outputs
  external_data_root: null

runtime:
  seed: 7
  device: cuda

train:
  folds: 2
  batch_size: 2
  image_size: 384
  epochs: 1
  num_workers: 0
  transform_profile: baseline
  fusion_head_variant: linear
  fusion_hidden_dim: 512
  fusion_dropout: 0.0
  fusion_activation: gelu
  fusion_layer_norm: false
  fusion_residual: false
  external_warmup_epochs: 0
  external_warmup_batch_size: 16
  external_warmup_num_workers: 0
  external_warmup_learning_rate: 0.001
